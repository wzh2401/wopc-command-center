<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOPC大会 · 项目指挥中心</title>
<style>
:root {
  --bg: #07080f;
  --bg2: #0d1017;
  --bg3: #141822;
  --bg4: #1a1f2e;
  --gold: #C9A84C;
  --gold-dim: #8a7535;
  --white: #e8e8e8;
  --gray: #8892a4;
  --gray2: #4a5568;
  --red: #F87171;
  --green: #34D399;
  --blue: #4A9EFF;
  --orange: #FB923C;
  --purple: #A78BFA;
  --pink: #FB7185;
  --cyan: #38BDF8;
  --indigo: #818CF8;
  --teal: #2DD4BF;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--white); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; line-height:1.5; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--gray2); border-radius:3px; }

/* HEADER */
.header {
  position:sticky; top:0; z-index:100;
  background: linear-gradient(135deg, #0a0e1a 0%, #111827 100%);
  border-bottom: 1px solid var(--gold-dim);
  padding: 12px 24px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
}
.header-left { display:flex; align-items:center; gap:16px; }
.header h1 { font-size:20px; color:var(--gold); letter-spacing:2px; }
.header .subtitle { font-size:12px; color:var(--gray); }
.countdown-box {
  background: linear-gradient(135deg, var(--gold), #b8962f);
  color:#000; padding:6px 16px; border-radius:20px;
  font-weight:700; font-size:14px; white-space:nowrap;
}
.nav-tabs { display:flex; gap:4px; }
.nav-tab {
  padding:8px 20px; border-radius:var(--radius); cursor:pointer;
  font-size:14px; font-weight:600; border:1px solid transparent;
  transition: all .2s;
}
.nav-tab.active { background:var(--gold); color:#000; }
.nav-tab:not(.active) { color:var(--gray); border-color:var(--gray2); }
.nav-tab:not(.active):hover { border-color:var(--gold); color:var(--gold); }

/* LAYOUT */
.view { display:none; padding:20px; max-width:1400px; margin:0 auto; }
.view.active { display:block; }

/* CARDS */
.card {
  background:var(--bg3); border:1px solid var(--gray2); border-radius:var(--radius);
  padding:16px; margin-bottom:16px;
}
.card-title {
  font-size:14px; font-weight:700; color:var(--gold); margin-bottom:12px;
  display:flex; align-items:center; gap:8px; cursor:pointer;
}
.card-title .toggle { font-size:10px; transition:transform .2s; }
.card-title .toggle.collapsed { transform:rotate(-90deg); }

/* GRID */
.grid2 { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:12px; }
.grid3 { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:12px; }
.grid4 { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; }

/* KPI */
.kpi-card {
  background:var(--bg4); border:1px solid var(--gray2); border-radius:var(--radius);
  padding:14px; text-align:center;
}
.kpi-card .kpi-label { font-size:12px; color:var(--gray); margin-bottom:6px; }
.kpi-card .kpi-value { display:flex; align-items:center; justify-content:center; gap:4px; margin-bottom:8px; }
.kpi-card .kpi-value input {
  width:60px; background:var(--bg2); border:1px solid var(--gray2); color:var(--gold);
  font-size:22px; font-weight:700; text-align:center; border-radius:4px; padding:2px;
}
.kpi-card .kpi-value input:focus { border-color:var(--gold); outline:none; }
.kpi-card .kpi-target { font-size:18px; color:var(--gray); font-weight:600; }
.progress-bar { height:6px; background:var(--bg); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width .4s; }

/* ROLE */
.role-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:8px; }
.role-item {
  display:flex; align-items:center; gap:8px; padding:8px 10px;
  background:var(--bg2); border-radius:6px; border:1px solid var(--gray2);
}
.role-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.role-title { font-size:12px; color:var(--gray); white-space:nowrap; min-width:70px; }
.role-input {
  flex:1; background:transparent; border:none; border-bottom:1px solid var(--gray2);
  color:var(--white); font-size:13px; padding:2px 4px;
}
.role-input:focus { border-bottom-color:var(--gold); outline:none; }

/* PHASE */
.phase-bar {
  display:flex; gap:4px; margin-bottom:8px;
}
.phase-seg {
  flex:1; padding:8px 12px; border-radius:6px; text-align:center;
  font-size:12px; border:1px solid var(--gray2); position:relative;
}
.phase-seg.current { border-color:var(--gold); box-shadow:0 0 8px rgba(201,168,76,0.3); }
.phase-seg .phase-name { font-weight:600; margin-bottom:2px; }
.phase-seg .phase-date { font-size:10px; color:var(--gray); }
.phase-seg .phase-pct { font-size:16px; font-weight:700; color:var(--gold); margin-top:4px; }

/* WORKSTREAM */
.ws-item {
  display:flex; align-items:center; gap:10px; padding:8px 0;
  border-bottom:1px solid var(--bg);
}
.ws-item:last-child { border-bottom:none; }
.ws-name { width:90px; font-size:13px; flex-shrink:0; }
.ws-bar { flex:1; }
.ws-pct { width:50px; text-align:right; font-size:13px; color:var(--gold); font-weight:600; }

/* URGENT */
.urgent-item {
  display:flex; align-items:flex-start; gap:8px; padding:8px; margin-bottom:6px;
  background:var(--bg2); border-radius:6px; border-left:3px solid var(--red);
}
.urgent-item.today { border-left-color:var(--gold); }
.urgent-item.upcoming { border-left-color:var(--blue); }
.urgent-date { font-size:11px; color:var(--gray); white-space:nowrap; min-width:50px; }
.urgent-text { font-size:13px; flex:1; }

/* ROLE SUMMARY */
.role-summary-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:8px; }
.role-sum-card {
  background:var(--bg2); border-radius:6px; padding:10px; border:1px solid var(--gray2);
}
.role-sum-header { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.role-sum-stats { display:flex; gap:8px; font-size:11px; color:var(--gray); }
.role-sum-stats span { display:flex; align-items:center; gap:2px; }

/* DAILY VIEW */
.daily-layout { display:flex; gap:16px; min-height:calc(100vh - 80px); }
.cal-sidebar { width:280px; flex-shrink:0; }
.daily-main { flex:1; min-width:0; }

.cal-month { margin-bottom:12px; }
.cal-month-title { font-size:13px; font-weight:700; color:var(--gold); margin-bottom:4px; text-align:center; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-header { font-size:10px; color:var(--gray); text-align:center; padding:2px; }
.cal-cell {
  aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:12px; border-radius:4px; cursor:pointer; border:2px solid transparent;
  background:var(--bg2); position:relative; transition:all .15s;
}
.cal-cell:empty { background:transparent; cursor:default; }
.cal-cell:hover:not(:empty) { background:var(--bg4); }
.cal-cell.today { box-shadow:0 0 0 1px var(--gold) inset; }
.cal-cell.selected { background:var(--gold) !important; color:#000 !important; font-weight:700; }
.cal-cell.all-done { border-color:var(--green); }
.cal-cell.some-done { border-color:var(--gold); }
.cal-cell.overdue { border-color:var(--red); }
.cal-cell.no-tasks { border-color:transparent; }
.cal-cell .star { position:absolute; top:1px; right:2px; font-size:8px; color:var(--gold); }
.cal-cell .badge {
  position:absolute; bottom:1px; right:2px; font-size:8px;
  background:var(--gray2); color:var(--white); border-radius:3px; padding:0 3px; line-height:1.4;
}
.cal-cell .phase-dot {
  position:absolute; bottom:1px; left:2px; width:4px; height:4px; border-radius:50%;
}

/* DAILY DETAIL */
.daily-header {
  background:var(--bg3); border:1px solid var(--gray2); border-radius:var(--radius);
  padding:16px; margin-bottom:12px;
}
.daily-header h2 { font-size:18px; color:var(--gold); }
.daily-header .meta { font-size:12px; color:var(--gray); margin-top:4px; display:flex; gap:12px; flex-wrap:wrap; }
.daily-header .meta .phase-label {
  padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600;
}

.ws-group { margin-bottom:16px; }
.ws-group-title {
  font-size:13px; font-weight:700; color:var(--gold); padding:6px 0;
  border-bottom:1px solid var(--gray2); margin-bottom:8px;
}

.task-item {
  display:flex; gap:10px; padding:10px; margin-bottom:6px;
  background:var(--bg3); border:1px solid var(--gray2); border-radius:6px;
  transition:all .15s; align-items:flex-start;
}
.task-item:hover { border-color:var(--gold-dim); }
.task-checkbox {
  width:22px; height:22px; border-radius:50%; border:2px solid var(--gray2);
  cursor:pointer; flex-shrink:0; margin-top:2px;
  display:flex; align-items:center; justify-content:center; font-size:12px;
  transition:all .15s; background:transparent;
}
.task-checkbox.status-1 { border-color:var(--gold); background:rgba(201,168,76,0.2); }
.task-checkbox.status-1::after { content:"~"; color:var(--gold); }
.task-checkbox.status-2 { border-color:var(--green); background:var(--green); }
.task-checkbox.status-2::after { content:"\2713"; color:#000; font-weight:700; }
.task-body { flex:1; min-width:0; }
.task-title-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.task-title { font-size:13px; font-weight:600; }
.task-desc { font-size:12px; color:var(--gray); margin-top:2px; }
.task-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.tag {
  font-size:10px; padding:1px 6px; border-radius:10px; font-weight:600;
  white-space:nowrap;
}
.tag-role { border:1px solid; }
.tag-p0 { background:rgba(248,113,113,0.2); color:var(--red); }
.tag-p1 { background:rgba(251,146,60,0.2); color:var(--orange); }
.tag-p2 { background:rgba(74,158,255,0.2); color:var(--blue); }
.tag-deliverable { background:rgba(52,211,153,0.15); color:var(--green); border:1px solid rgba(52,211,153,0.3); }
.tag-time { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.task-item.completed .task-title { text-decoration:line-through; color:var(--gray); }

/* MILESTONE */
.milestone-box {
  background:linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.03));
  border:1px solid var(--gold-dim); border-radius:var(--radius);
  padding:16px; margin-bottom:16px;
}
.milestone-box h3 { color:var(--gold); font-size:15px; margin-bottom:10px; }
.ms-check { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; }
.ms-check input[type=checkbox] { accent-color:var(--gold); width:16px; height:16px; }

/* TIMELINE OVERLAY */
.tl-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(4,6,14,0.92); z-index:200;
  display:none; overflow-y:auto;
  backdrop-filter:blur(8px);
}
.tl-overlay.show { display:flex; justify-content:center; }
.tl-wrap {
  width:100%; max-width:860px; padding:30px 20px 60px;
}
.tl-close {
  position:fixed; top:20px; right:28px; z-index:210;
  width:40px; height:40px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--gray2);
  color:var(--gray); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.tl-close:hover { color:var(--gold); border-color:var(--gold); }
.tl-head {
  text-align:center; margin-bottom:12px;
}
.tl-head h2 { font-size:22px; color:var(--gold); letter-spacing:1px; }
.tl-head .tl-sub { font-size:13px; color:var(--gray); margin-top:4px; }
.tl-stats {
  display:flex; justify-content:center; gap:20px; margin:16px 0 32px;
}
.tl-stat {
  text-align:center; padding:10px 18px; background:var(--bg3);
  border:1px solid var(--gray2); border-radius:8px; min-width:80px;
}
.tl-stat .n { font-size:22px; font-weight:800; line-height:1; }
.tl-stat .l { font-size:10px; color:var(--gray); margin-top:4px; }

/* S-TIMELINE SPINE */
.s-tl { position:relative; padding:0 10px; }
.s-tl::before {
  content:''; position:absolute; left:50%; top:0; bottom:0; width:2px;
  background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 50%, var(--gray2) 100%);
  transform:translateX(-50%);
}

/* PHASE DIVIDER */
.tl-phase-div {
  text-align:center; position:relative; margin:28px 0 20px; z-index:2;
}
.tl-phase-pill {
  display:inline-block; padding:5px 20px; border-radius:14px;
  font-size:12px; font-weight:700; letter-spacing:1px;
  background:var(--bg); border:1px solid;
}

/* TIMELINE NODE */
.tl-node {
  display:flex; margin-bottom:16px; position:relative; min-height:60px;
}
.tl-node.left { justify-content:flex-start; }
.tl-node.right { justify-content:flex-end; }
.tl-card {
  width:calc(50% - 28px); padding:12px 14px;
  background:var(--bg3); border:1px solid var(--gray2); border-radius:8px;
  transition:all .2s; cursor:default; position:relative;
}
.tl-card:hover { border-color:var(--gold-dim); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.4); }
/* Arrow pointer */
.tl-node.left .tl-card::after {
  content:''; position:absolute; top:16px; right:-7px;
  width:12px; height:12px; background:var(--bg3);
  border-right:1px solid var(--gray2); border-top:1px solid var(--gray2);
  transform:rotate(45deg); border-radius:2px;
}
.tl-node.right .tl-card::after {
  content:''; position:absolute; top:16px; left:-7px;
  width:12px; height:12px; background:var(--bg3);
  border-left:1px solid var(--gray2); border-bottom:1px solid var(--gray2);
  transform:rotate(45deg); border-radius:2px;
}
.tl-node.left .tl-card:hover::after { border-color:var(--gold-dim); }
.tl-node.right .tl-card:hover::after { border-color:var(--gold-dim); }

/* Center dot */
.tl-dot2 {
  position:absolute; left:50%; top:16px; transform:translateX(-50%);
  width:14px; height:14px; border-radius:50%; z-index:3;
  border:2.5px solid var(--gold); background:var(--bg);
  transition:all .2s;
}
.tl-dot2.st-done { background:var(--green); border-color:var(--green); box-shadow:0 0 6px rgba(52,211,153,0.4); }
.tl-dot2.st-doing { background:var(--gold); border-color:var(--gold); box-shadow:0 0 6px rgba(201,168,76,0.4); }
.tl-dot2.st-overdue { background:var(--red); border-color:var(--red); box-shadow:0 0 6px rgba(248,113,113,0.4); }
.tl-dot2.st-future { background:var(--bg2); border-color:var(--gray2); }

/* Card content */
.tl-card .tl-date { font-size:11px; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.tl-card .tl-title2 { font-size:13px; font-weight:600; color:var(--white); line-height:1.4; }
.tl-card .tl-desc2 { font-size:11px; color:var(--gray); margin-top:3px; line-height:1.4; }
.tl-card .tl-tags2 { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.tl-card.is-done { opacity:0.5; }
.tl-card.is-done .tl-title2 { text-decoration:line-through; }

/* Status dot legend */
.tl-legend {
  display:flex; justify-content:center; gap:16px; margin-bottom:24px;
  font-size:11px; color:var(--gray);
}
.tl-legend span { display:flex; align-items:center; gap:4px; }
.tl-legend .ld { width:10px; height:10px; border-radius:50%; }

/* ============ GANTT CHART ============ */
.gantt-header {
  text-align:center; margin-bottom:20px;
}
.gantt-header h2 { font-size:20px; color:var(--gold); letter-spacing:1px; }
.gantt-header .gantt-sub { font-size:13px; color:var(--gray); margin-top:4px; }

.gantt-legend {
  display:flex; justify-content:center; gap:16px; margin-bottom:16px; flex-wrap:wrap;
}
.gantt-legend-item {
  display:flex; align-items:center; gap:5px; font-size:11px; color:var(--gray);
}
.gantt-legend-color {
  width:14px; height:8px; border-radius:2px;
}

.gantt-container {
  background:var(--bg3); border:1px solid var(--gray2); border-radius:var(--radius);
  overflow-x:auto; position:relative;
}

.gantt-timeline-header {
  display:flex; border-bottom:1px solid var(--gray2);
  position:sticky; top:0; z-index:10; background:var(--bg3);
}
.gantt-label-header {
  min-width:280px; width:280px; flex-shrink:0;
  padding:8px 12px; font-size:12px; font-weight:700; color:var(--gold);
  border-right:1px solid var(--gray2);
  display:flex; align-items:center;
}
.gantt-dates-header {
  flex:1; display:flex; position:relative; min-width:600px;
}
.gantt-date-col {
  flex:1; text-align:center; padding:6px 2px;
  font-size:10px; color:var(--gray); border-left:1px solid var(--bg);
}
.gantt-date-col.weekend { background:rgba(255,255,255,0.02); }
.gantt-date-col.today-col { background:rgba(201,168,76,0.08); }

.gantt-ws-group { border-bottom:1px solid var(--gray2); }
.gantt-ws-header {
  display:flex; cursor:pointer; transition:background .15s;
  background:var(--bg4);
}
.gantt-ws-header:hover { background:var(--bg2); }
.gantt-ws-label {
  min-width:280px; width:280px; flex-shrink:0;
  padding:8px 12px; font-size:13px; font-weight:700;
  border-right:1px solid var(--gray2);
  display:flex; align-items:center; gap:8px;
}
.gantt-ws-label .ws-toggle { font-size:10px; transition:transform .2s; }
.gantt-ws-label .ws-toggle.collapsed { transform:rotate(-90deg); }
.gantt-ws-bar-area {
  flex:1; min-width:600px; position:relative; height:36px;
}

.gantt-task-row {
  display:flex; transition:background .15s;
}
.gantt-task-row:hover { background:rgba(255,255,255,0.02); }
.gantt-task-row.milestone-row { background:rgba(201,168,76,0.04); }
.gantt-task-label {
  min-width:200px; width:200px; flex-shrink:0;
  padding:4px 12px 4px 28px; font-size:12px;
  display:flex; align-items:center;
  border-right:1px solid var(--gray2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gantt-task-role {
  min-width:80px; width:80px; flex-shrink:0;
  padding:4px 6px; font-size:10px; color:var(--gray);
  display:flex; align-items:center;
  border-right:1px solid var(--gray2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gantt-task-bar-area {
  flex:1; min-width:600px; position:relative; height:28px;
}
.gantt-bar {
  position:absolute; top:5px; height:18px; border-radius:3px;
  min-width:8px; z-index:2; transition:opacity .15s;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; color:rgba(255,255,255,0.8); overflow:hidden;
  cursor:default;
}
.gantt-bar:hover { opacity:0.85; }
.gantt-bar.bar-done {
  background:var(--green) !important;
}
.gantt-bar.bar-overdue {
  background:var(--red) !important;
}
.gantt-bar.bar-inprogress {
  background-image:repeating-linear-gradient(
    -45deg, transparent, transparent 3px,
    rgba(255,255,255,0.15) 3px, rgba(255,255,255,0.15) 6px
  ) !important;
}

.gantt-today-line {
  position:absolute; top:0; bottom:0; width:2px; z-index:5;
  border-left:2px dashed var(--red);
  pointer-events:none;
}
.gantt-today-label {
  position:absolute; top:-2px; font-size:9px; color:var(--red);
  font-weight:700; white-space:nowrap; transform:translateX(-50%);
}

.gantt-milestone-marker {
  position:absolute; top:0; bottom:0; z-index:4;
  pointer-events:none;
}
.gantt-milestone-star {
  position:absolute; top:2px; font-size:12px; color:var(--gold);
  transform:translateX(-50%);
}

/* ============ DOCUMENT CENTER ============ */
.docs-section {
  margin-bottom:24px;
}
.docs-section-title {
  font-size:16px; font-weight:700; color:var(--gold); margin-bottom:16px;
  padding-bottom:8px; border-bottom:1px solid var(--gray2);
}

.docs-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:12px;
}
.doc-card {

// ============ STATE ============
let taskStatus = {};
let roleNames = {};
let kpiValues = {};
let selectedDate = null;
let currentView = 'dashboard';

function loadState() {
  try { taskStatus = JSON.parse(localStorage.getItem('wopc_tasks')) || {}; } catch(e) { taskStatus = {}; }
  try { roleNames = JSON.parse(localStorage.getItem('wopc_roles')) || {}; } catch(e) { roleNames = {}; }
  try { kpiValues = JSON.parse(localStorage.getItem('wopc_kpi')) || {}; } catch(e) { kpiValues = {}; }
  ROLES_DEF.forEach(r => { if (!roleNames[r.key]) roleNames[r.key] = r.default; });
  KPI_DEF.forEach(k => { if (kpiValues[k.key] === undefined) kpiValues[k.key] = 0; });
}

function saveTaskStatus() { localStorage.setItem('wopc_tasks', JSON.stringify(taskStatus)); }
function saveRoles() { localStorage.setItem('wopc_roles', JSON.stringify(roleNames)); }
function saveKpi() { localStorage.setItem('wopc_kpi', JSON.stringify(kpiValues)); }

function getStatus(id) { return taskStatus[id] || 0; }
function setStatus(id, s) { taskStatus[id] = s; saveTaskStatus(); }

function today() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function toDate(s) { return new Date(s+'T00:00:00'); }
function diffDays(a, b) { return Math.round((toDate(b)-toDate(a))/(86400000)); }

function getPhase(date) {
  for (let p of PHASES) {
    if (date >= p.start && date <= p.end) return p;
  }
  return null;
}

function getRoleDef(key) { return ROLES_DEF.find(r=>r.key===key); }
function getRoleName(key) { return roleNames[key] || ''; }
function getRoleColor(key) { let r = getRoleDef(key); return r ? r.color : '#888'; }
function getRoleTitle(key) { let r = getRoleDef(key); return r ? r.title : key; }

function getTasksByDate(date) { return TASKS.filter(t=>t.date===date); }

// ============ COUNTDOWN ============
function updateCountdown() {
  const d = diffDays(today(), '2026-05-27');
  document.getElementById('countdown').textContent = d > 0 ? `距大会 ${d} 天` : d === 0 ? '今天是大会日！' : `大会已结束 ${-d} 天`;
}

// ============ SWITCH VIEW ============
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === v);
  });
  ['dashboard','gantt','daily','docs'].forEach(id => {
    document.getElementById('view-'+id).classList.toggle('active', id===v);
  });
  if (v==='dashboard') renderDashboard();
  if (v==='daily') renderCalendar();
  if (v==='gantt') renderGantt();
  if (v==='docs') renderDocs();
}

function toggleCard(id) {
  const el = document.getElementById(id);
  const tog = document.getElementById('toggle-'+id);
  if (el.style.display==='none') { el.style.display=''; if(tog) tog.classList.remove('collapsed'); }
  else { el.style.display='none'; if(tog) tog.classList.add('collapsed'); }
}

// ============ DASHBOARD ============
function renderDashboard() {
  renderRoles();
  renderKPI();
  renderPhases();
  renderWorkstreams();
  renderUrgent();
  renderRoleSummary();
}

function renderRoles() {
  const g = document.getElementById('role-grid');
  g.innerHTML = ROLES_DEF.map(r => `
    <div class="role-item">
      <div class="role-dot" style="background:${r.color}"></div>
      <div class="role-title" style="cursor:pointer;transition:color .2s;" onclick="openTL('${r.key}')" onmouseover="this.style.color='${r.color}'" onmouseout="this.style.color=''">${r.title}</div>
      <input class="role-input" value="${getRoleName(r.key)}" onchange="roleNames['${r.key}']=this.value;saveRoles();renderAll();" onclick="event.stopPropagation()" />
      <span style="font-size:10px;color:${r.color};cursor:pointer;white-space:nowrap;" onclick="openTL('${r.key}')">时间轴→</span>
    </div>
  `).join('');
}

function renderKPI() {
  const g = document.getElementById('kpi-grid');
  g.innerHTML = KPI_DEF.map(k => {
    const v = kpiValues[k.key] || 0;
    const pct = Math.min(100, Math.round(v/k.target*100));
    const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--gold)' : 'var(--red)';
    return `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">
        <input type="number" min="0" value="${v}" onchange="kpiValues['${k.key}']=Number(this.value);saveKpi();renderKPI();" />
        <span class="kpi-target">/ ${k.target}${k.unit}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color};"></div></div>
      <div style="font-size:11px;color:${color};margin-top:4px;">${pct}%</div>
    </div>`;
  }).join('');
}

function renderPhases() {
  const bar = document.getElementById('phase-bar');
  const td = today();
  bar.innerHTML = PHASES.map(p => {
    const tasks = TASKS.filter(t=>t.date>=p.start&&t.date<=p.end);
    const done = tasks.filter(t=>getStatus(t.id)===2).length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const isCurrent = td >= p.start && td <= p.end;
    return `
    <div class="phase-seg ${isCurrent?'current':''}" style="border-color:${p.color}40;${isCurrent?'background:'+p.color+'15':''}">
      <div class="phase-name" style="color:${p.color}">${p.name}</div>
      <div class="phase-date">${p.start.slice(5)} ~ ${p.end.slice(5)}</div>
      <div class="phase-pct">${pct}%</div>
      <div class="progress-bar" style="margin-top:4px;"><div class="progress-fill" style="width:${pct}%;background:${p.color};"></div></div>
    </div>`;
  }).join('');
}

function renderWorkstreams() {
  const el = document.getElementById('ws-list');
  el.innerHTML = WORKSTREAMS.map(w => {
    const tasks = TASKS.filter(t=>t.ws===w.key);
    const done = tasks.filter(t=>getStatus(t.id)===2).length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    return `
    <div class="ws-item">
      <div class="ws-name">${w.label}</div>
      <div class="ws-bar"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${w.color};"></div></div></div>
      <div class="ws-pct">${done}/${tasks.length} (${pct}%)</div>
    </div>`;
  }).join('');
}

function renderUrgent() {
  const el = document.getElementById('urgent-list');
  const td = today();
  const overdue = TASKS.filter(t=>t.date<td && getStatus(t.id)<2);
  const todayT = TASKS.filter(t=>t.date===td && getStatus(t.id)<2);
  const upcoming = TASKS.filter(t=>{
    const d = diffDays(td, t.date);
    return d>0 && d<=3 && getStatus(t.id)<2;
  });

  let html = '';
  if (overdue.length===0 && todayT.length===0 && upcoming.length===0) {
    html = '<div style="color:var(--gray);font-size:13px;padding:8px;">暂无紧急事项</div>';
  }
  overdue.slice(0,10).forEach(t => {
    html += `<div class="urgent-item"><div class="urgent-date" style="color:var(--red);">${t.date.slice(5)} 逾期</div><div class="urgent-text"><strong>${t.title}</strong> <span style="font-size:11px;color:var(--gray);">[${getRoleTitle(t.role)}]</span></div></div>`;
  });
  if (overdue.length>10) html += `<div style="color:var(--red);font-size:12px;padding:4px 8px;">...还有 ${overdue.length-10} 项逾期任务</div>`;
  todayT.forEach(t => {
    html += `<div class="urgent-item today"><div class="urgent-date" style="color:var(--gold);">今天</div><div class="urgent-text"><strong>${t.title}</strong> <span style="font-size:11px;color:var(--gray);">[${getRoleTitle(t.role)}]</span></div></div>`;
  });
  upcoming.forEach(t => {
    html += `<div class="urgent-item upcoming"><div class="urgent-date">${t.date.slice(5)}</div><div class="urgent-text"><strong>${t.title}</strong> <span style="font-size:11px;color:var(--gray);">[${getRoleTitle(t.role)}]</span></div></div>`;
  });
  el.innerHTML = html;
}

function renderRoleSummary() {
  const el = document.getElementById('role-summary');
  const td = today();
  el.innerHTML = ROLES_DEF.map(r => {
    const tasks = TASKS.filter(t=>t.role===r.key);
    const done = tasks.filter(t=>getStatus(t.id)===2).length;
    const inprog = tasks.filter(t=>getStatus(t.id)===1).length;
    const overdue = tasks.filter(t=>t.date<td && getStatus(t.id)<2).length;
    return `
    <div class="role-sum-card" onclick="openTL('${r.key}')" style="cursor:pointer;transition:all .2s;" onmouseover="this.style.borderColor='${r.color}'" onmouseout="this.style.borderColor=''">
      <div class="role-sum-header">
        <div class="role-dot" style="background:${r.color}"></div>
        <div><strong style="font-size:13px;">${r.title}</strong> <span style="font-size:11px;color:var(--gray);">${getRoleName(r.key)}</span> <span style="font-size:10px;color:${r.color};margin-left:4px;">查看时间轴 →</span></div>
      </div>
      <div class="role-sum-stats">
        <span>总${tasks.length}</span>
        <span style="color:var(--green);">完${done}</span>
        <span style="color:var(--gold);">进${inprog}</span>
        <span style="color:var(--red);">逾${overdue}</span>
      </div>
      <div class="progress-bar" style="margin-top:6px;"><div class="progress-fill" style="width:${tasks.length?Math.round(done/tasks.length*100):0}%;background:${r.color};"></div></div>
    </div>`;
  }).join('');
}

// ============ CALENDAR ============
function renderCalendar() {
  const sidebar = document.getElementById('cal-sidebar');
  let html = '';
  const months = [[2026,4,'2026年4月'],[2026,5,'2026年5月'],[2026,6,'2026年6月']];
  const dayNames = ['一','二','三','四','五','六','日'];

  months.forEach(([y,m,label]) => {
    html += `<div class="cal-month"><div class="cal-month-title">${label}</div><div class="cal-grid">`;
    dayNames.forEach(d => html += `<div class="cal-header">${d}</div>`);
    const first = new Date(y, m-1, 1);
    let dow = first.getDay(); if(dow===0) dow=7; // Monday=1
    for (let i=1; i<dow; i++) html += '<div class="cal-cell"></div>';
    const daysInMonth = new Date(y, m, 0).getDate();
    for (let d=1; d<=daysInMonth; d++) {
      const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const tasks = getTasksByDate(ds);
      const td = today();
      let cls = '';
      if (ds === td) cls += ' today';
      if (ds === selectedDate) cls += ' selected';
      if (tasks.length > 0) {
        const allDone = tasks.every(t=>getStatus(t.id)===2);
        const someDone = tasks.some(t=>getStatus(t.id)>0);
        const hasOverdue = ds < td && tasks.some(t=>getStatus(t.id)<2);
        if (hasOverdue) cls += ' overdue';
        else if (allDone) cls += ' all-done';
        else if (someDone) cls += ' some-done';
      } else {
        cls += ' no-tasks';
      }
      const isMilestone = MILESTONE_DATES.includes(ds);
      const phase = getPhase(ds);
      html += `<div class="cal-cell${cls}" onclick="selectDate('${ds}')">${d}`;
      if (isMilestone) html += '<span class="star">&#9733;</span>';
      if (tasks.length>0) html += `<span class="badge">${tasks.length}</span>`;
      if (phase) html += `<span class="phase-dot" style="background:${phase.color}"></span>`;
      html += '</div>';
    }
    html += '</div></div>';
  });
  sidebar.innerHTML = html;
  if (selectedDate) renderDailyDetail(selectedDate);
}

function selectDate(ds) {
  selectedDate = ds;
  renderCalendar();
  renderDailyDetail(ds);
}

function renderDailyDetail(ds) {
  const main = document.getElementById('daily-main');
  const tasks = getTasksByDate(ds);
  const dt = toDate(ds);
  const dayNames = ['日','一','二','三','四','五','六'];
  const dayOfWeek = '周' + dayNames[dt.getDay()];
  const phase = getPhase(ds);
  const daysUntil = diffDays(ds, '2026-05-27');
  const done = tasks.filter(t=>getStatus(t.id)===2).length;
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;

  let html = `<div class="daily-header">
    <h2>${ds.slice(5).replace('-','/')} ${dayOfWeek}</h2>
    <div class="meta">`;
  if (phase) html += `<span class="phase-label" style="background:${phase.color}30;color:${phase.color};border:1px solid ${phase.color}50;">${phase.name}</span>`;
  if (daysUntil > 0) html += `<span>距大会 ${daysUntil} 天</span>`;
  else if (daysUntil === 0) html += `<span style="color:var(--gold);font-weight:700;">大会日！</span>`;
  html += `<span>任务 ${done}/${tasks.length}</span>`;
  html += `</div>
    <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--gold)'}"></div></div>
  </div>`;

  // Milestone
  if (MILESTONES[ds]) {
    const ms = MILESTONES[ds];
    html += `<div class="milestone-box"><h3>&#9733; ${ms.label}</h3>`;
    ms.checks.forEach((c,i) => {
      const ck = `ms_${ds}_${i}`;
      const checked = taskStatus[ck] ? 'checked' : '';
      html += `<div class="ms-check"><input type="checkbox" ${checked} onchange="taskStatus['${ck}']=this.checked?2:0;saveTaskStatus();"> <span>${c}</span></div>`;
    });
    html += '</div>';
  }

  if (tasks.length === 0) {
    html += '<div style="text-align:center;color:var(--gray);padding:40px;">该日无任务</div>';
  } else {
    // Group by workstream
    const groups = {};
    tasks.forEach(t => {
      if (!groups[t.ws]) groups[t.ws] = [];
      groups[t.ws].push(t);
    });
    // Sort by time if available
    Object.keys(groups).forEach(ws => {
      groups[ws].sort((a,b) => {
        const ta = a.time || '99:99';
        const tb = b.time || '99:99';
        return ta.localeCompare(tb);
      });
    });

    const wsOrder = ['现场执行','宣传推广','嘉宾管理','展位招商','设计物料','行政运营'];
    const orderedKeys = wsOrder.filter(w => groups[w]);
    // Add any remaining
    Object.keys(groups).forEach(k => { if (!orderedKeys.includes(k)) orderedKeys.push(k); });

    orderedKeys.forEach(ws => {
      const wsDef = WORKSTREAMS.find(w=>w.key===ws);
      html += `<div class="ws-group"><div class="ws-group-title" style="color:${wsDef?wsDef.color:'var(--gold)'}">${ws} (${groups[ws].length})</div>`;
      groups[ws].forEach(t => {
        const s = getStatus(t.id);
        const roleDef = getRoleDef(t.role);
        const roleColor = getRoleColor(t.role);
        html += `<div class="task-item ${s===2?'completed':''}">
          <div class="task-checkbox status-${s}" onclick="cycleStatus('${t.id}')"></div>
          <div class="task-body">
            <div class="task-title-row">
              <span class="task-title">${t.title}</span>
              <span class="tag tag-${t.priority.toLowerCase()}">${t.priority}</span>
            </div>
            ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
            <div class="task-tags">
              <span class="tag tag-role" style="color:${roleColor};border-color:${roleColor}40;">${getRoleTitle(t.role)} ${getRoleName(t.role)}</span>
              ${t.deliverable ? `<span class="tag tag-deliverable">${t.deliverable}</span>` : ''}
              ${t.time ? `<span class="tag tag-time">${t.time}</span>` : ''}
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
  }

  main.innerHTML = html;
}

function cycleStatus(id) {
  const s = getStatus(id);
  setStatus(id, (s+1)%3);
  renderDailyDetail(selectedDate);
  if (currentView==='dashboard') renderDashboard();
  // Update calendar cell colors
  renderCalendar();
}

// ============ GANTT CHART ============
let ganttCollapsed = {};

function renderGantt() {
  const container = document.getElementById('gantt-content');
  const startDate = '2026-04-11';
  const endDate = '2026-05-27';
  const totalDays = diffDays(startDate, endDate); // 46 days, 47 columns (0-indexed inclusive)
  const td = today();

  // Build date columns
  const dateCols = [];
  for (let i = 0; i <= totalDays; i++) {
    const d = new Date(toDate(startDate).getTime() + i * 86400000);
    const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dow = d.getDay();
    dateCols.push({ date:ds, day:d.getDate(), month:d.getMonth()+1, isWeekend: dow===0||dow===6 });
  }

  // Phase colors for bars
  function getPhaseColor(date) {
    for (let p of PHASES) {
      if (date >= p.start && date <= p.end) return p.color;
    }
    return '#888';
  }

  let html = '';

  // Header
  html += `<div class="gantt-header">
    <h2>筹备甘特图 · 4月11日—5月27日（${totalDays+1}天）</h2>
    <div class="gantt-sub">基于任务数据自动生成 · 实时反映完成状态</div>
  </div>`;

  // Phase legend
  html += '<div class="gantt-legend">';
  PHASES.forEach(p => {
    html += `<div class="gantt-legend-item"><div class="gantt-legend-color" style="background:${p.color}"></div>${p.name} ${p.start.slice(5)}~${p.end.slice(5)}</div>`;
  });
  html += `<div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--green)"></div>已完成</div>`;
  html += `<div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--red)"></div>逾期</div>`;
  html += `<div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--gold);background-image:repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(255,255,255,0.2) 2px,rgba(255,255,255,0.2) 4px)"></div>进行中</div>`;
  html += '</div>';

  // Main container
  html += '<div class="gantt-container">';

  // Timeline header with dates
  html += '<div class="gantt-timeline-header">';
  html += '<div class="gantt-label-header">工作流 / 任务</div>';
  html += '<div class="gantt-dates-header" style="position:relative;">';
  dateCols.forEach((dc, i) => {
    // Show label every 5 days or on day 1
    const showLabel = i === 0 || i % 5 === 0 || i === totalDays;
    const isToday = dc.date === td;
    html += `<div class="gantt-date-col${dc.isWeekend?' weekend':''}${isToday?' today-col':''}" style="min-width:18px;">${showLabel ? dc.month+'/'+dc.day : ''}</div>`;
  });
  html += '</div></div>';

  // Workstream rows
  WORKSTREAMS.forEach(ws => {
    const wsTasks = TASKS.filter(t => t.ws === ws.key && t.date >= startDate && t.date <= endDate)
      .sort((a,b) => a.date.localeCompare(b.date));
    if (wsTasks.length === 0) return;

    const isCollapsed = ganttCollapsed[ws.key] || false;
    const done = wsTasks.filter(t => getStatus(t.id)===2).length;
    const pct = Math.round(done/wsTasks.length*100);

    html += '<div class="gantt-ws-group">';
    // Workstream header
    html += `<div class="gantt-ws-header" onclick="toggleGanttWs('${ws.key}')">`;
    html += `<div class="gantt-ws-label"><span class="ws-toggle${isCollapsed?' collapsed':''}" style="color:${ws.color}">&#9660;</span><span style="color:${ws.color}">${ws.label}</span><span style="font-size:11px;color:var(--gray);margin-left:auto;">${done}/${wsTasks.length} (${pct}%)</span></div>`;
    html += `<div class="gantt-ws-bar-area" style="position:relative;">`;
    // Aggregate bar for workstream (span from first to last task)
    if (wsTasks.length > 0) {
      const firstDay = diffDays(startDate, wsTasks[0].date);
      const lastDay = diffDays(startDate, wsTasks[wsTasks.length-1].date);
      const leftPct = (firstDay / totalDays * 100);
      const widthPct = Math.max(2, ((lastDay - firstDay + 1) / totalDays * 100));
      html += `<div style="position:absolute;top:10px;height:16px;left:${leftPct}%;width:${widthPct}%;background:${ws.color}30;border:1px solid ${ws.color}60;border-radius:3px;"></div>`;
    }
    html += '</div></div>';

    // Task rows (collapsible)
    if (!isCollapsed) {
      wsTasks.forEach(t => {
        const s = getStatus(t.id);
        const dayIdx = diffDays(startDate, t.date);
        const leftPct = (dayIdx / totalDays * 100);
        const widthPct = Math.max(2, (1 / totalDays * 100));

        let barClass = '';
        let barColor = getPhaseColor(t.date);
        if (s === 2) { barClass = 'bar-done'; }
        else if (t.date < td && s < 2) { barClass = 'bar-overdue'; }
        else if (s === 1) { barClass = 'bar-inprogress'; }

        const isMilestone = MILESTONE_DATES.includes(t.date);
        const roleTitle = getRoleTitle(t.role);

        html += `<div class="gantt-task-row${isMilestone?' milestone-row':''}">`;
        html += `<div class="gantt-task-label" title="${t.title}"><span class="tag tag-${t.priority.toLowerCase()}" style="font-size:9px;margin-right:4px;">${t.priority}</span>${t.title}</div>`;
        html += `<div class="gantt-task-role" style="color:${getRoleColor(t.role)}">${roleTitle}</div>`;
        html += `<div class="gantt-task-bar-area">`;
        html += `<div class="gantt-bar ${barClass}" style="left:${leftPct}%;width:${widthPct}%;background:${barColor};" title="${t.date.slice(5)} ${t.title}"></div>`;
        html += `</div></div>`;
      });
    }

    html += '</div>';
  });

  html += '</div>'; // end gantt-container

  // Now add today marker and milestone markers via overlay after render
  container.innerHTML = html;

  // Add today marker and milestones to the date header area
  requestAnimationFrame(() => {
    const datesHeader = container.querySelector('.gantt-dates-header');
    if (!datesHeader) return;

    // Today marker
    const todayIdx = diffDays(startDate, td);
    if (todayIdx >= 0 && todayIdx <= totalDays) {
      const todayPct = ((todayIdx + 0.5) / (totalDays + 1) * 100);
      // Add today line to all bar areas
      const barAreas = container.querySelectorAll('.gantt-task-bar-area, .gantt-ws-bar-area');
      barAreas.forEach(area => {
        const line = document.createElement('div');
        line.className = 'gantt-today-line';
        line.style.left = (todayIdx / totalDays * 100) + '%';
        area.appendChild(line);
      });
      // Add label to dates header
      const label = document.createElement('div');
      label.className = 'gantt-today-label';
      label.style.left = (todayIdx / totalDays * 100) + '%';
      label.style.position = 'absolute';
      label.style.bottom = '-2px';
      label.textContent = '今天';
      datesHeader.appendChild(label);
      // Add line to dates header
      const headerLine = document.createElement('div');
      headerLine.className = 'gantt-today-line';
      headerLine.style.left = (todayIdx / totalDays * 100) + '%';
      datesHeader.appendChild(headerLine);
    }

    // Milestone markers
    const msDates = ['2026-04-20','2026-05-10','2026-05-20','2026-05-27'];
    msDates.forEach(msDate => {
      const msIdx = diffDays(startDate, msDate);
      if (msIdx >= 0 && msIdx <= totalDays) {
        const star = document.createElement('div');
        star.className = 'gantt-milestone-star';
        star.style.left = (msIdx / totalDays * 100) + '%';
        star.style.position = 'absolute';
        star.style.top = '0px';
        star.innerHTML = '&#9733;';
        datesHeader.appendChild(star);
      }
    });
  });
}

function toggleGanttWs(wsKey) {
  ganttCollapsed[wsKey] = !ganttCollapsed[wsKey];
  renderGantt();
}

// ============ TIMELINE ============
function openTL(roleKey) {
  const rd = getRoleDef(roleKey);
  if (!rd) return;
  const tasks = TASKS.filter(t => t.role === roleKey).sort((a,b) => a.date.localeCompare(b.date) || (a.time||'99').localeCompare(b.time||'99'));
  const td = today();
  const total = tasks.length;
  const done = tasks.filter(t => getStatus(t.id)===2).length;
  const doing = tasks.filter(t => getStatus(t.id)===1).length;
  const overdue = tasks.filter(t => t.date<td && getStatus(t.id)<2).length;
  const pct = total ? Math.round(done/total*100) : 0;

  const dayNames = ['日','一','二','三','四','五','六'];
  let html = '';
  // Header
  html += `<div class="tl-head">
    <h2 style="color:${rd.color}">${rd.title}</h2>
    <div class="tl-sub">${getRoleName(roleKey)} · 个人任务时间轴</div>
  </div>`;
  // Stats
  html += `<div class="tl-stats">
    <div class="tl-stat"><div class="n" style="color:var(--white)">${total}</div><div class="l">总任务</div></div>
    <div class="tl-stat"><div class="n" style="color:var(--green)">${done}</div><div class="l">已完成</div></div>
    <div class="tl-stat"><div class="n" style="color:var(--gold)">${doing}</div><div class="l">进行中</div></div>
    <div class="tl-stat"><div class="n" style="color:var(--red)">${overdue}</div><div class="l">逾期</div></div>
    <div class="tl-stat"><div class="n" style="color:${rd.color}">${pct}%</div><div class="l">完成率</div></div>
  </div>`;
  // Legend
  html += `<div class="tl-legend">
    <span><div class="ld" style="background:var(--green)"></div>已完成</span>
    <span><div class="ld" style="background:var(--gold)"></div>进行中</span>
    <span><div class="ld" style="background:var(--red)"></div>逾期</span>
    <span><div class="ld" style="background:var(--bg2);border:2px solid var(--gray2)"></div>未来</span>
  </div>`;

  // Timeline
  html += '<div class="s-tl">';
  let lastPhase = null;
  let idx = 0;
  tasks.forEach(t => {
    const phase = getPhase(t.date);
    // Phase divider
    if (phase && (!lastPhase || lastPhase.name !== phase.name)) {
      html += `<div class="tl-phase-div"><span class="tl-phase-pill" style="color:${phase.color};border-color:${phase.color}50">${phase.name} ${phase.start.slice(5)}~${phase.end.slice(5)}</span></div>`;
      lastPhase = phase;
    }
    // If no phase (post-event)
    if (!phase && lastPhase) {
      html += `<div class="tl-phase-div"><span class="tl-phase-pill" style="color:var(--gray);border-color:var(--gray2)">展后传播</span></div>`;
      lastPhase = null; // only show once
    }

    const s = getStatus(t.id);
    const side = idx % 2 === 0 ? 'left' : 'right';
    const dt = toDate(t.date);
    const dow = '周' + dayNames[dt.getDay()];
    const dateStr = t.date.slice(5).replace('-','/');
    const daysLeft = diffDays(t.date, '2026-05-27');

    // Dot class
    let dotCls = 'st-future';
    if (s === 2) dotCls = 'st-done';
    else if (s === 1) dotCls = 'st-doing';
    else if (t.date < td) dotCls = 'st-overdue';

    // Date color
    let dateColor = phase ? phase.color : 'var(--gray)';
    if (t.date < td && s < 2) dateColor = 'var(--red)';
    if (s === 2) dateColor = 'var(--green)';

    const wsDef = WORKSTREAMS.find(w=>w.key===t.ws);

    html += `<div class="tl-node ${side}">
      <div class="tl-dot2 ${dotCls}"></div>
      <div class="tl-card ${s===2?'is-done':''}">
        <div class="tl-date" style="color:${dateColor}">
          ${dateStr} ${dow}
          ${t.time ? `<span class="tag tag-time" style="font-size:9px;padding:0 5px;">${t.time}</span>` : ''}
          ${daysLeft > 0 ? `<span style="font-size:9px;color:var(--gray);margin-left:auto;">T-${daysLeft}</span>` : ''}
          ${daysLeft === 0 ? `<span style="font-size:9px;color:var(--gold);margin-left:auto;">大会日</span>` : ''}
        </div>
        <div class="tl-title2">${t.title}</div>
        ${t.desc ? `<div class="tl-desc2">${t.desc}</div>` : ''}
        <div class="tl-tags2">
          <span class="tag tag-${t.priority.toLowerCase()}" style="font-size:9px;">${t.priority}</span>
          ${wsDef ? `<span class="tag" style="font-size:9px;color:${wsDef.color};background:${wsDef.color}15;border:1px solid ${wsDef.color}30;">${wsDef.label}</span>` : ''}
          ${t.deliverable ? `<span class="tag tag-deliverable" style="font-size:9px;">${t.deliverable}</span>` : ''}
        </div>
      </div>
    </div>`;
    idx++;
  });
  html += '</div>';

  if (tasks.length === 0) {
    html += '<div style="text-align:center;color:var(--gray);padding:60px;">该角色暂无任务</div>';
  }

  document.getElementById('tl-content').innerHTML = html;
  document.getElementById('tl-overlay').classList.add('show');
  document.getElementById('tl-overlay').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeTL() {
  document.getElementById('tl-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ESC to close
document.addEventListener('keydown', e => { if (e.key==='Escape') closeTL(); });
